<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Registration form</title>
</head>
<body>
    
        <h1 style="color:blueviolet ; text-align:center; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif ;">SUMMER INTERNSHIP REGISTRATION FORM</h1>
        <h2 style="color:rgb(216, 95, 238); text-align:center;">2025-26</h2>
        <hr>
        <div class="input-group">
        <form>
            <h1 style="color:black; text-align:center;">--Personal Information--</h1><br>
            <label for="name">Name:</label>
            <input type="text"id="fullname" name="fullname" required><br><br>
            
            <label for="Department">Department:</label>
            <input type="text" id="Department" name="Department" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="Gender">Gender:</label>
            <input type="text" id="Gender" name="Gender" required><br><br>

            <label for="DOB">DOB:</label>
            <input type="date" id="DOB" name="DOB" required><br><br>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required><br><br>

        </div><br>
        <hr><br>
        <div class="output-group">
            <form>
                <h1 style="color:black; text-align:center;">--College Information--</h1><br>
               
                <label for="College">College:</label>
                <input type="text" id="college" name="college" required><br><br>

                <label for="State">State:</label>
                <input type="text" id="State" name="State" required><br><br>
            </form>
        </div><br>
        <hr>
        <br>
        <div class="class-group">
            <form>
                <h1 style="color:black; text-align:center;">--Confirmation--</h1><br>
                <label for="Password">Password:</label>
                <input type="password" id="password" name="password" minlength="8" required><br><br>

                <label for="Confirm Password">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required><br><br>
            </form>

        </div><br>
        <hr>
        <br>
        <div class="submit-group">
            <form>
                <label for="Apply">Apply:</label>
                <input type="submit" id="submit" name="submit" value="Apply"><br><br>
            </form>
        </div>
</body>
</html>
