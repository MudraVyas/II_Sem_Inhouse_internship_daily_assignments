<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>College Admission Form</title>
    
</head>
<body>
    <img src="logo.png" alt="University logo" style="display:block; margin:auto; width:150px; height:50px;">

    <h1 style="color:Brown; text-align:center;">UNIVERSITY ADMISSION FORM</h1>
    <h3 style="color:rgb(111, 38, 38); text-align:center;">Admissions open: 2026-27</h3>
    <p class="tagline">Define Your Future</p>

    <form>
        <h2 style="color:brown; text-align:center";>Applicant Details</h2><br>
        <label for="name" style="color:rgb(111, 38, 38);">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

        <label for="DOB" style="color:rgb(111, 38, 38);">Date of birth:</label>
        <input type="date" id="DOB" name="DOB" placeholder="Enter your date of birth" required><br><br>

        <label for="Gender" style="color:rgb(111, 38, 38);">Gender:</label>
        <select id="Gender" name="Gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select><br><br>
        <hr><br>
    
    
        <h2 style="color:brown; text-align:center";>Academic Profile</h2><br>
        <label for="12th Board" style="color:rgb(111, 38, 38);">12th Board:</label>
        <input type="text" id="12th Board" name="12th Board" placeholder="Enter your 12th Board" required><br><br>

        <label for="12th Percentage" style="color:rgb(111, 38, 38);">12th Percentage:</label>
        <input type="number" id="12th Percentage" name="12th Percentage" placeholder="Enter your 12th Percentage" required><br><br>

        <label for="Stream" style="color:rgb(111, 38, 38);">Stream:</label>
        <select id="Stream" name="Stream" required>
            <option value="">Select Stream</option>
            <option value="Science">Science</option>
            <option value="Commerce">Commerce</option>
            <option value="Arts">Arts</option>
        </select><br><br>
        

        <label for="Preferred Course" style="color:rgb(111, 38, 38);">Preferred Course:</label>
        <select id="Preferred Course" name="Preferred Course" required>
            <option value="">Select Preferred Course</option>
            <option value="B.Tech">B.Tech</option>
            <option value="BBA">BBA</option>
            <option value="BCA">BCA</option>
            <option value="MBA">MBA</option>
            <option value="MCA">MCA</option>
        </select><br><br>
        <hr>
    
    
        <h2 style="color:brown; text-align:center";>Contact Details</h2><br>
        <label for="Email" style="color:rgb(111, 38, 38);">Email:</label>
        <input type="email" id="Email" name="Email" placeholder="Enter your email" required><br><br>

        <label for="Phone Number" style="color:rgb(111, 38, 38);">Phone Number:</label>
        <input type="tel" id="Phone Number" name="Phone Number" placeholder="Enter your phone number" required><br><br>

        <label for="Address" style="color:rgb(111, 38, 38);">Address:</label>
        <textarea id="Address" name="Address" placeholder="Enter your address" required></textarea><br><br>

        <label for="State" style="color:rgb(111, 38, 38);">State:</label>
        <input type="text" id="State" name="State" placeholder="Enter your state" required><br><br>

        <label for="City" style="color:rgb(111, 38, 38);">City:</label>
        <input type="text" id="City" name="City" placeholder="Enter your city" required><br><br>

        <label for="Pin-Code" style="color:rgb(111, 38, 38);">Pin Code:</label>
        <input type="text" id="Pin-Code" name="Pin-Code" placeholder="Enter your pin code" required><br><br>

         <hr>
    
    
        <h2 style="color: brown; text-align:center";>Parents Information</h2><br>
        <label for="Father's name" style="color:rgb(111, 38, 38);">Father's name:</label>
        <input type="text" id="Father's name" name="Father's name" placeholder="Enter your father's name" required><br><br>

        <label for="Phone Number" style="color:rgb(111, 38, 38);">Father's Phone Number:</label>
        <input type="tel" id="Father's Phone Number" name="Father's Phone Number" placeholder="Enter your father's phone number" required><br><br>

        <label for="Mother's name" style="color:rgb(111, 38, 38);">Mother's name:</label>
        <input type="text" id="Mother's name" name="Mother's name" placeholder="Enter your mother's name" required><br><br>

        <label for="Phone Number" style="color:rgb(111, 38, 38);">Mother's Phone Number:</label>
        <input type="tel" id="Mother's Phone Number" name="Mother's Phone Number" placeholder="Enter your mother's phone number" required><br><br>

        <hr>
    
    
        <h2 style="color: brown; text-align:center";>Supporting Documents</h2><br>

        <label for="Photograph" style="color:rgb(111, 38, 38);">Photograph:</label>
        <input type="file" id="Photograph" name="Photograph" required><br><br>

        <label for="12th Marksheet" style="color:rgb(111, 38, 38);">12th Marksheet:</label>
        <input type="file" id="12th Marksheet" name="12th Marksheet" required><br><br>

        <label for="ID Proof" style="color:rgb(111, 38, 38);">ID Proof:</label>
        <input type="file" id="ID Proof" name="ID Proof" required><br><br>

        <hr>
    
        <h2 style="color: brown; text-align:center";>Confirmation</h2><br>
        <input type="checkbox" id="Declaration" name="Declaration" required>
        <label for="Declaration" style="color:rgb(111, 38, 38);">I hereby declare that the information provided is true and correct to the best of my knowledge.</label><br><br>
          
        <label for="Apply" style="color:rgb(111, 38, 38); text-align: center;"></label>
        <input type="Submit" id="Apply" name="Apply" value="Apply"><br><br>

    </form>
              
</body>
</html>
